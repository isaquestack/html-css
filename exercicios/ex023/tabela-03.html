<!DOCTYPE html>
<html lang="p-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
         table{
            width: 300px;
            border-collapse: collapse;
         }

         td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
         }
    </style>
</head>
<body>
    <h1>Mesclatgem Células</h1>
    <table>
        <tr>
            <td>A</td>
            <td colspan="2">B</td>
        </tr>
        <tr>
            <td rowspan="3">D</td>
            <td>E</td>
            <td rowspan="2">F</td>
        </tr>
        <tr>
            <td>G</td>
            
            
        </tr>
        <tr>
            <td colspan="2">J</td>
            
        </tr>
    </table>
</body>
</html>
