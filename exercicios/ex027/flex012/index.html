<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexible Box</title>
    <style>
      .conteiner {
        background-color: lightsalmon;

        display: flex;
        flex-flow: row nowrap;
      }

      .item {
        background-color: lightskyblue;
        border: 1px solid black;
        text-align: center;
      }

      #cxA {
        /*flex-shrink: 0;
        flex-grow: 1;
        flex-basis: 220px;*/

        flex: 1 0 220px;
      }
      #cxB {
        /*flex-shrink: 1;
        flex-grow: 1;
        flex-basis: 150px;*/

        flex: 1 1 150px;
      }
      #cxC {
        /*flex-shrink: 3;
        flex-grow: 1;
        flex-basis: auto;*/

        flex: 1 3 auto;
      }
    </style>
  </head>
  <body>
    <div class="conteiner">
      <div class="item" id="cxA">A</div>
      <div class="item" id="cxB">B</div>
      <div class="item" id="cxC">C</div>
    </div>
  </body>
</html>
