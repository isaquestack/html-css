<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserindo imagens</title>
</head>
<body>
    <h1>Inserindo imagens</h1>
    <p>A imagem abaixo está na mesma pasta do arquivo raiz.</p>
    <img src="logo-html.png" alt="logo-html">
    <p>Podemos carregar imagens que estão em sub-pastas.</p>
    <img src="imagens/logo-css.png" alt="logo-css">
    <p>Também é possível carregar imagens que estão na internet, é só copiar o link da imagem e colar dentro de "src" na tag de &lt;img&gt;.</p>
    <img src="https://a.thumbs.redditmedia.com/zDOFJTXd6fmlD58VDGypiV94Leflz11woxmgbGY6p_4.png" alt="logo-JavaScript">
</body>
</html>
