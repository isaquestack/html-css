<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Teste de Formulário 01</title>
</head>
<body>
    <form action="" method="post" autocomplete="on">
        <h1>Teste de Formulário</h1>
    <p>
        <label for="isu">Usuário:</label>
        <input type="text" name="usu" id="isu" required minlength="5" max="15" size="10" placeholder="nome do usuário" autocomplete="username">
    </p>
    <p>
        <label for="isen">Senha:</label >
        <input type="password" name="sen" id="isen" required minlength="8" maxlength="20" size="10" placeholder="xxxxxxxx" autocomplete="current-password"> <!-- ou new passorwd para cadastrar nova senha-->
    </p>
    <p>
        <input type="submit" value="Cadastrar">
        <input type="reset" value="Limpar">
    </p>
    </form>
</body>
</html>
