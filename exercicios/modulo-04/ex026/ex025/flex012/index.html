<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fexible Box</title>
    <style>
        div.conteiner{
            display: flex;
            background-color: lightsalmon;
            flex-flow: row nowrap;
           
        }
        div.item{
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;
           
        }
        div#cxA{
            /*flex-shrink: 0;
            flex-grow: 1;
            flex-basis: 250px;*/
            flex: 1 0 250px;
        }
        div#cxB{
           /*flex-shrink: 1;
           flex-grow: 1;
           flex-basis: 150px; */
           flex: 1 1 150px;
        }
        div#cxC{
           /*flex-shrink:3;
           flex-grow:1; 
           flex-basis: auto;*/
           flex: 1 3 auto;
        }
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item" id="cxA">A</div>
        <div class="item" id="cxB">B</div>
        <div class="item" id="cxC">C</div>
       
       
    </div>
</body>
</html>
